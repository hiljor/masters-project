<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horse Algos Visualization</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .grid-container { display: inline-grid; gap: 1px; background-color: #e5e7eb; border: 1px solid #d1d5db; }
        .grid-cell { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 10px; position: relative; }
        .cutset-mark::after { content: '×'; position: absolute; color: red; font-size: 24px; font-weight: bold; line-height: 1; }
    </style>
</head>
<body class="bg-gray-100 h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const COLOR_MAP = {
            '#': 'bg-slate-800 text-white', // Wall
            'H': 'bg-white shadow-inner',    // Horse
            'c': 'bg-purple-500 text-white', // Inf node
            ' ': 'bg-emerald-600',          // Grass
        };

        function getCellColor(char) {
            if (char >= '0' && char <= '9') return 'bg-teal-500 text-white'; // Portal
            return COLOR_MAP[char] || 'bg-gray-200';
        }

        function App() {
            const [config, setConfig] = useState({ algorithms: {}, maps: [], languages: [] });
            const [selectedAlgo, setSelectedAlgo] = useState("");
            const [selectedMap, setSelectedMap] = useState("");
            const [selectedLang, setSelectedLang] = useState("python");
            const [k, setK] = useState(1);
            const [mapLines, setMapLines] = useState([]);
            const [loading, setLoading] = useState(false);
            const [solveResult, setSolveResult] = useState(null);
            const [error, setError] = useState(null);
            const [currentTaskId, setCurrentTaskId] = useState(null);
            const [abortController, setAbortController] = useState(null);

            useEffect(() => {
                fetch('/api/config')
                    .then(res => res.json())
                    .then(data => {
                        setConfig(data);
                        if (data.languages && data.languages.length > 0) {
                            const initialLang = data.languages[0];
                            setSelectedLang(initialLang);
                            if (data.algorithms[initialLang] && data.algorithms[initialLang].length > 0) {
                                setSelectedAlgo(data.algorithms[initialLang][0]);
                            }
                        }
                        if (data.maps.length > 0) setSelectedMap(data.maps[0]);
                    })
                    .catch(err => setError("Failed to load configuration"));
            }, []);

            // Update algorithm when language changes
            useEffect(() => {
                if (config.algorithms[selectedLang] && config.algorithms[selectedLang].length > 0) {
                    if (!config.algorithms[selectedLang].includes(selectedAlgo)) {
                        setSelectedAlgo(config.algorithms[selectedLang][0]);
                    }
                }
            }, [selectedLang, config.algorithms]);

            useEffect(() => {
                if (selectedMap) {
                    setSolveResult(null);
                    fetch(`/api/map/${selectedMap}`)
                        .then(res => res.json())
                        .then(data => setMapLines(data.lines))
                        .catch(err => setError("Failed to load map data"));
                }
            }, [selectedMap]);

            const currentAlgos = useMemo(() => {
                return config.algorithms[selectedLang] || [];
            }, [selectedLang, config.algorithms]);

            const handleSolve = async () => {
                setLoading(true);
                setSolveResult(null);
                setError(null);
                const taskId = Math.random().toString(36).substring(7);
                setCurrentTaskId(taskId);
                const controller = new AbortController();
                setAbortController(controller);

                try {
                    const res = await fetch('/api/solve', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            algorithm: selectedAlgo, 
                            map_file: selectedMap, 
                            k: parseInt(k),
                            language: selectedLang,
                            task_id: taskId
                        }),
                        signal: controller.signal
                    });
                    const data = await res.json();
                    if (res.ok) {
                        setSolveResult(data);
                    } else if (res.status !== 499) { // 499 is often used for client closed request
                         setError(data.detail || "An error occurred");
                    }
                } catch (err) {
                    if (err.name === 'AbortError') {
                        console.log('Fetch aborted');
                    } else {
                        setError("Communication error");
                    }
                } finally {
                    setLoading(false);
                    setCurrentTaskId(null);
                    setAbortController(null);
                }
            };

            const handleCancel = async () => {
                if (currentTaskId) {
                    fetch(`/api/cancel/${currentTaskId}`, { method: 'POST' });
                    if (abortController) abortController.abort();
                    setLoading(false);
                    setCurrentTaskId(null);
                    setAbortController(null);
                    setError("Operation cancelled by user");
                }
            };

            const isCutset = (x, y) => {
                if (!solveResult || !solveResult.cutset) return false;
                return solveResult.cutset.some(c => c[0] === x && c[1] === y);
            };

            const gridWidth = useMemo(() => mapLines.length > 0 ? Math.max(...mapLines.map(l => l.length)) : 0, [mapLines]);

            return (
                <div className="flex h-full">
                    {/* Sidebar */}
                    <div className="w-80 bg-white border-r border-gray-200 p-6 flex flex-col space-y-8 shadow-sm z-10">
                        <div>
                            <h1 className="text-xl font-bold text-gray-900 flex items-center">
                                <span className="text-indigo-600 mr-2">🐎</span>
                                Horse Solver
                            </h1>
                        </div>

                        <div className="space-y-6">
                            <div>
                                <label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Language Implementation</label>
                                <select 
                                    value={selectedLang}
                                    onChange={(e) => setSelectedLang(e.target.value)}
                                    className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none appearance-none font-semibold text-indigo-700"
                                >
                                    {config.languages.map(l => <option key={l} value={l}>{l.toUpperCase()}</option>)}
                                </select>
                            </div>

                            <div>
                                <label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Algorithm</label>
                                <select 
                                    value={selectedAlgo}
                                    onChange={(e) => setSelectedAlgo(e.target.value)}
                                    className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none appearance-none"
                                >
                                    {currentAlgos.map(a => <option key={a} value={a}>{a}</option>)}
                                </select>
                            </div>

                            <div>
                                <label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Map File</label>
                                <select 
                                    value={selectedMap}
                                    onChange={(e) => setSelectedMap(e.target.value)}
                                    className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none appearance-none"
                                >
                                    {config.maps.map(m => <option key={m} value={m}>{m}</option>)}
                                </select>
                            </div>

                            <div>
                                <label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Cut Size (K)</label>
                                <input 
                                    type="number"
                                    min="0"
                                    value={k}
                                    onChange={(e) => setK(e.target.value)}
                                    className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"
                                />
                            </div>
                        </div>

                        {error && (
                            <div className="p-4 bg-red-50 text-red-600 text-sm rounded-xl border border-red-100 italic">
                                {error}
                            </div>
                        )}

                        <div className="mt-auto pt-6 border-t border-gray-100">
                            <p className="text-[10px] text-gray-400 font-mono text-center uppercase tracking-tighter">Algorithm Engine v2.0-Alpha</p>
                        </div>
                    </div>

                    {/* Content Area */}
                    <div className="flex-1 flex flex-col overflow-hidden bg-gray-50 relative">
                        {/* Header Area */}
                        <div className="p-6 flex justify-between items-center bg-white border-b border-gray-200">
                            <div>
                                <h2 className="text-sm font-semibold text-gray-500 uppercase tracking-wide">Visualization View</h2>
                                <p className="text-lg font-bold text-gray-900">{selectedMap || "No map selected"}</p>
                            </div>
                            <div className="flex items-center space-x-6 text-right">
                                {solveResult && (
                                    <div className="animate-in fade-in duration-500 flex items-center space-x-6 mr-6">
                                        <div className="text-right">
                                            <p className="text-[10px] font-bold text-gray-400 uppercase">Time</p>
                                            <p className="text-indigo-600 font-mono font-bold text-lg">{solveResult.time_ms}ms</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-[10px] font-bold text-gray-400 uppercase">Result</p>
                                            <p className="text-emerald-600 font-bold text-lg">{solveResult.result}</p>
                                        </div>
                                    </div>
                                )}
                                <button 
                                    onClick={handleSolve}
                                    disabled={loading || !selectedMap}
                                    className={`px-8 py-3 rounded-xl font-bold text-white transition-all transform active:scale-95 flex items-center ${loading ? 'bg-gray-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 shadow-md hover:shadow-indigo-200'}`}
                                >
                                    {loading && <svg className="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>}
                                    {loading ? "Running..." : "Solve Graph"}
                                </button>
                                {loading && (
                                    <button 
                                        onClick={handleCancel}
                                        className="px-6 py-3 rounded-xl font-bold text-red-600 bg-red-50 hover:bg-red-100 border border-red-200 transition-all transform active:scale-95 shadow-sm"
                                    >
                                        Cancel
                                    </button>
                                )}
                            </div>
                        </div>

                        {/* Map Grid Area */}
                        <div className="flex-1 overflow-auto p-12 flex items-center justify-center">
                            <div 
                                className="grid-container" 
                                style={{ gridTemplateColumns: `repeat(${gridWidth}, 32px)` }}
                            >
                                {mapLines.map((line, y) => (
                                    Array.from({ length: gridWidth }).map((_, x) => {
                                        const char = line[x] || ' ';
                                        return (
                                            <div 
                                                key={`${x}-${y}`} 
                                                className={`grid-cell ${getCellColor(char)} ${isCutset(x, y) ? 'cutset-mark' : ''}`}
                                                title={`(${x}, ${y}): ${char}`}
                                            >
                                                {char !== ' ' ? char : ''}
                                            </div>
                                        );
                                    })
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
