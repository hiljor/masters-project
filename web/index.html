<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horse Algos Solver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div id="root" class="w-full max-w-lg"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [config, setConfig] = useState({ algorithms: [], maps: [] });
            const [selectedAlgo, setSelectedAlgo] = useState("");
            const [selectedMap, setSelectedMap] = useState("");
            const [k, setK] = useState(1);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);

            useEffect(() => {
                fetch('/api/config')
                    .then(res => res.json())
                    .then(data => {
                        setConfig(data);
                        if (data.algorithms.length > 0) setSelectedAlgo(data.algorithms[0]);
                        if (data.maps.length > 0) setSelectedMap(data.maps[0]);
                    })
                    .catch(err => setError("Failed to load configuration"));
            }, []);

            const handleSolve = async () => {
                setLoading(true);
                setResult(null);
                setError(null);
                try {
                    const res = await fetch('/api/solve', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ algorithm: selectedAlgo, map_file: selectedMap, k: parseInt(k) })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        setResult(data.result);
                    } else {
                        setError(data.detail || "An error occurred");
                    }
                } catch (err) {
                    setError("Failed to communicate with server");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
                    <div class="bg-indigo-600 p-6">
                        <h1 class="text-2xl font-bold text-white">Horse Algos Solver</h1>
                        <p class="text-indigo-100 mt-1">Select parameters to solve the graph problem</p>
                    </div>
                    
                    <div class="p-8 space-y-6">
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">Algorithm</label>
                                <select 
                                    value={selectedAlgo}
                                    onChange={(e) => setSelectedAlgo(e.target.value)}
                                    class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                                >
                                    {config.algorithms.map(a => <option key={a} value={a}>{a}</option>)}
                                </select>
                            </div>

                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">Map File</label>
                                <select 
                                    value={selectedMap}
                                    onChange={(e) => setSelectedMap(e.target.value)}
                                    class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                                >
                                    {config.maps.map(m => <option key={m} value={m}>{m}</option>)}
                                </select>
                            </div>

                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">K Value (Max Cut Size)</label>
                                <input 
                                    type="number"
                                    min="0"
                                    value={k}
                                    onChange={(e) => setK(e.target.value)}
                                    class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                                />
                            </div>
                        </div>

                        <button 
                            onClick={handleSolve}
                            disabled={loading}
                            class={`w-full py-4 rounded-xl font-bold text-white transition-all transform active:scale-95 ${loading ? 'bg-gray-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 hover:shadow-lg'}`}
                        >
                            {loading ? (
                                <span class="flex items-center justify-center">
                                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                    </svg>
                                    Processing...
                                </span>
                            ) : "Run Algorithm"}
                        </button>

                        {result !== null && (
                            <div class="mt-6 p-4 bg-green-50 border border-green-100 rounded-xl text-center">
                                <p class="text-green-800 font-semibold">Solution Result</p>
                                <p class="text-3xl font-bold text-green-600 mt-2">{result}</p>
                            </div>
                        )}

                        {error && (
                            <div class="mt-6 p-4 bg-red-50 border border-red-100 rounded-xl text-center">
                                <p class="text-red-800 font-semibold italic">{error}</p>
                            </div>
                        )}
                    </div>
                    
                    <div class="bg-gray-50 p-4 border-t border-gray-100 text-center">
                        <p class="text-xs text-gray-400 font-medium tracking-wider uppercase">Algorithm Visualizer Engine v1.0</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
